<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>三场两结果 最小金额3串1计算器</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --danger: #b91c1c;
      --ok: #047857;
      --warn: #b45309;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
        Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    header { margin: 8px 0 18px; }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }
    .grid { display: grid; gap: 12px; }
    .matches { grid-template-columns: repeat(3, 1fr); }
    .match {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #fbfdff;
    }
    .match h2 {
      font-size: 16px;
      margin: 0 0 10px;
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 11px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .team-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .odds-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .top-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: end;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 15px;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary {
      color: var(--text);
      background: #eef2ff;
    }
    button:active { transform: translateY(1px); }
    .summary {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .stat {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .stat .name {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .stat .value {
      font-size: 18px;
      font-weight: 700;
      word-break: break-all;
    }
    .positive { color: var(--ok); }
    .negative { color: var(--danger); }
    .warning { color: var(--warn); }
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1040px;
      background: #fff;
    }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      font-size: 14px;
      vertical-align: top;
    }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2),
    th:nth-child(3), td:nth-child(3) {
      text-align: left;
    }
    th {
      color: var(--muted);
      background: #f9fafb;
      font-weight: 600;
    }
    tr:last-child td { border-bottom: 0; }
    .selected {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .match-name {
      margin-top: 6px;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }
    .tips {
      color: var(--muted);
      font-size: 13px;
    }
    .error {
      color: var(--danger);
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
    .notice {
      color: var(--warn);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      margin-left: 4px;
      white-space: nowrap;
    }
    .small {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }
    @media (max-width: 900px) {
      h1 { font-size: 21px; }
      .matches { grid-template-columns: 1fr; }
      .top-row { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
      .card { padding: 14px; }
      .team-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>三场两结果 最小金额3串1计算器</h1>
      <p class="sub">输入三场比赛的主队、客队和胜/平/负赔率，自动选择每场赔率最低的两个结果，并计算“最高收益率比例”下可直接出票的最小金额。</p>
    </header>

    <section class="card">
      <div class="top-row">
        <div>
          <label for="multiple">购买倍数</label>
          <input id="multiple" type="number" inputmode="numeric" value="1" min="1" step="1">
          <div class="small">1 = 最小金额方案；填 2、3、10 会按相同比例整体放大，收益率不变。</div>
        </div>
        <button id="calcBtn">计算最小方案</button>
        <button id="copyBtn" class="secondary">复制清单</button>
      </div>
      <div class="error" id="errorBox"></div>
      <div class="notice" id="noticeBox"></div>
    </section>

    <section class="card">
      <div class="grid matches" id="matches"></div>
    </section>

    <section class="card">
      <div class="summary">
        <div class="stat">
          <div class="name">最小总金额</div>
          <div class="value" id="sMinStake">-</div>
        </div>
        <div class="stat">
          <div class="name">实际总金额</div>
          <div class="value" id="sStake">-</div>
        </div>
        <div class="stat">
          <div class="name">总注数</div>
          <div class="value" id="sUnits">-</div>
        </div>
        <div class="stat">
          <div class="name">任一命中返还</div>
          <div class="value" id="sReturn">-</div>
        </div>
        <div class="stat">
          <div class="name">收益率</div>
          <div class="value" id="sRate">-</div>
        </div>
      </div>
      <p class="tips">提示：“胜”表示主队胜，“负”表示客队胜。这个版本不是按预算分配，而是先求能让 8 种结果返还完全相同的整数注数比例，再输出最小可出票金额。</p>
    </section>

    <section class="card">
      <h2 style="font-size:16px;margin:0 0 10px;">8 注购买清单</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>注单</th>
              <th>比赛</th>
              <th>组合</th>
              <th>串关赔率</th>
              <th>最小注数</th>
              <th>实际买几注</th>
              <th>购买金额</th>
              <th>命中返还</th>
              <th>净收益</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

<script>
const outcomeNames = [
  { key: "win", label: "胜" },
  { key: "draw", label: "平" },
  { key: "lose", label: "负" },
];

const matchesEl = document.getElementById("matches");
const tbody = document.getElementById("tbody");
const errorBox = document.getElementById("errorBox");
const noticeBox = document.getElementById("noticeBox");
let latestText = "";

function gcd(a, b) {
  a = a < 0n ? -a : a;
  b = b < 0n ? -b : b;
  while (b !== 0n) {
    const t = a % b;
    a = b;
    b = t;
  }
  return a;
}
function lcm(a, b) {
  if (a === 0n || b === 0n) return 0n;
  return (a / gcd(a, b)) * b;
}
function pow10(n) {
  let x = 1n;
  for (let i = 0; i < n; i++) x *= 10n;
  return x;
}
function reduceFrac(f) {
  const g = gcd(f.n, f.d);
  return { n: f.n / g, d: f.d / g };
}
function mulFrac(a, b) {
  return reduceFrac({ n: a.n * b.n, d: a.d * b.d });
}
function parseDecimalToFraction(raw) {
  let s = String(raw || "").trim().replace(",", ".");
  if (!/^\d+(\.\d+)?$/.test(s)) {
    throw new Error(`赔率格式不正确：${raw}`);
  }
  if (s.includes(".")) {
    const [i, dec] = s.split(".");
    const d = pow10(dec.length);
    const n = BigInt(i + dec);
    return reduceFrac({ n, d });
  }
  return { n: BigInt(s), d: 1n };
}
function fracToNumber(f) {
  return Number(f.n) / Number(f.d);
}
function bigIntToMoneyString(x) {
  // x 是整数金额，单位：元
  return "￥" + x.toLocaleString("zh-CN") + ".00";
}
function fmtMoneyNumber(x) {
  return Number(x).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtOddsNumber(x) {
  return Number(x).toLocaleString("zh-CN", { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}
function fmtRateNumber(x) {
  return (x * 100).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "%";
}
function safeTeamName(value, fallback) {
  const v = String(value || "").trim();
  return v || fallback;
}
function outcomeText(item) {
  if (item.key === "win") return `${item.home}胜`;
  if (item.key === "draw") return `${item.home}平${item.away}`;
  return `${item.away}胜`;
}
function shortOutcomeText(item) {
  if (item.key === "win") return `${item.home}胜`;
  if (item.key === "draw") return `平`;
  return `${item.away}胜`;
}

function renderInputs() {
  matchesEl.innerHTML = "";
  for (let i = 0; i < 3; i++) {
    const div = document.createElement("div");
    div.className = "match";
    div.innerHTML = `
      <h2>第 ${i + 1} 场</h2>
      <div class="team-row">
        <div>
          <label>主队</label>
          <input id="m${i}_home" type="text" placeholder="例如：阿森纳">
        </div>
        <div>
          <label>客队</label>
          <input id="m${i}_away" type="text" placeholder="例如：切尔西">
        </div>
      </div>
      <div class="odds-row">
        ${outcomeNames.map(o => `
          <div>
            <label>${o.label}赔率</label>
            <input id="m${i}_${o.key}" type="number" inputmode="decimal" min="1.01" step="0.01" placeholder="${o.label}">
          </div>
        `).join("")}
      </div>
      <div class="match-name" id="matchname_${i}">第 ${i + 1} 场：主队 vs 客队</div>
      <div class="selected" id="selected_${i}">将自动选择最低的两个赔率</div>
    `;
    matchesEl.appendChild(div);
  }
}
renderInputs();

function readOdds() {
  const result = [];
  const matchLabels = [];

  for (let i = 0; i < 3; i++) {
    const home = safeTeamName(document.getElementById(`m${i}_home`).value, `第${i + 1}场主队`);
    const away = safeTeamName(document.getElementById(`m${i}_away`).value, `第${i + 1}场客队`);
    const matchLabel = `${home} vs ${away}`;
    matchLabels.push(matchLabel);
    document.getElementById(`matchname_${i}`).textContent = `第 ${i + 1} 场：${matchLabel}`;

    const arr = outcomeNames.map(o => {
      const raw = document.getElementById(`m${i}_${o.key}`).value;
      if (raw === "") {
        throw new Error(`请填写第 ${i + 1} 场「${matchLabel}」的胜/平/负赔率。`);
      }
      const value = parseFloat(raw);
      if (!Number.isFinite(value) || value <= 1) {
        throw new Error(`第 ${i + 1} 场「${matchLabel}」的赔率必须大于 1。`);
      }
      return {
        match: i + 1,
        key: o.key,
        label: o.label,
        oddsRaw: raw,
        oddsNumber: value,
        frac: parseDecimalToFraction(raw),
        home,
        away,
        matchLabel
      };
    });

    arr.sort((a, b) => a.oddsNumber - b.oddsNumber);
    const selected = arr.slice(0, 2);
    result.push(selected);

    document.getElementById(`selected_${i}`).innerHTML =
      `已选：${selected.map(x => `${outcomeText(x)} <span class="badge">${x.oddsRaw}</span>`).join("，")}`;
  }

  return { selectedByMatch: result, matchLabels };
}

function cartesian(arrays) {
  return arrays.reduce((acc, curr) => {
    const next = [];
    for (const a of acc) for (const c of curr) next.push([...a, c]);
    return next;
  }, [[]]);
}

function calculate() {
  try {
    errorBox.style.display = "none";
    noticeBox.style.display = "none";

    const multipleRaw = document.getElementById("multiple").value;
    let multiple = BigInt(Math.floor(Number(multipleRaw || "1")));
    if (multiple < 1n) {
      throw new Error("购买倍数必须是大于等于 1 的整数。");
    }

    const { selectedByMatch, matchLabels } = readOdds();
    const combos = cartesian(selectedByMatch).map((combo, idx) => {
      const oddsFrac = combo.reduce((f, x) => mulFrac(f, x.frac), { n: 1n, d: 1n });
      const oddsNumber = combo.reduce((p, x) => p * x.oddsNumber, 1);
      return {
        idx: idx + 1,
        combo,
        matchNames: combo.map(x => `第${x.match}场：${x.matchLabel}`).join("<br>"),
        name: combo.map(x => shortOutcomeText(x)).join(" × "),
        fullName: combo.map(x => `${x.matchLabel}：${outcomeText(x)}`).join("；"),
        oddsFrac,
        oddsNumber,
      };
    });

    // 设每注注数为 u_j，串关赔率为 p_j/q_j。
    // 为了使所有返还相同，需要 u_j * p_j/q_j = K。
    // 因 p_j/q_j 已约分，最小 K = lcm(p_1, ..., p_8)。
    let K = 1n;
    for (const c of combos) K = lcm(K, c.oddsFrac.n);

    let minTotalUnits = 0n;
    for (const c of combos) {
      c.minUnits = (K * c.oddsFrac.d) / c.oddsFrac.n;
      c.units = c.minUnits * multiple;
      c.amount = c.units * 2n;
      minTotalUnits += c.minUnits;
    }

    const totalUnits = minTotalUnits * multiple;
    const minStake = minTotalUnits * 2n;
    const actualStake = totalUnits * 2n;
    const singleReturn = K * 2n * multiple;
    const profit = singleReturn - actualStake;

    tbody.innerHTML = "";
    const rowsText = [];

    for (const c of combos) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>第 ${c.idx} 注</td>
        <td>${c.matchNames}</td>
        <td>${c.name}</td>
        <td>${fmtOddsNumber(c.oddsNumber)}</td>
        <td>${c.minUnits.toLocaleString("zh-CN")} 注</td>
        <td>${c.units.toLocaleString("zh-CN")} 注</td>
        <td>${bigIntToMoneyString(c.amount)}</td>
        <td>${bigIntToMoneyString(singleReturn)}</td>
        <td class="${profit >= 0n ? "positive" : "negative"}">${bigIntToMoneyString(profit)}</td>
      `;
      tbody.appendChild(tr);
      rowsText.push(`第${c.idx}注｜${c.fullName}｜赔率 ${fmtOddsNumber(c.oddsNumber)}｜最小 ${c.minUnits.toLocaleString("zh-CN")} 注｜实际 ${c.units.toLocaleString("zh-CN")} 注｜金额 ${bigIntToMoneyString(c.amount)}｜命中返还 ${bigIntToMoneyString(singleReturn)}`);
    }

    const rate = Number(profit) / Number(actualStake);

    document.getElementById("sMinStake").textContent = bigIntToMoneyString(minStake);
    document.getElementById("sStake").textContent = bigIntToMoneyString(actualStake);
    document.getElementById("sUnits").textContent = `${totalUnits.toLocaleString("zh-CN")} 注`;
    document.getElementById("sReturn").textContent = bigIntToMoneyString(singleReturn);
    document.getElementById("sRate").textContent = fmtRateNumber(rate);
    document.getElementById("sRate").className = `value ${profit >= 0n ? "positive" : "negative"}`;

    if (minStake > 100000n) {
      noticeBox.textContent = `提示：当前赔率小数导致“完全等比例”的最小金额为 ${bigIntToMoneyString(minStake)}，金额较大。如果只是实际投注，可把赔率四舍五入或改用预算分配模式。`;
      noticeBox.style.display = "block";
    }

    const selectedText = selectedByMatch.map((s, i) =>
      `第${i + 1}场 ${matchLabels[i]}：选 ${s.map(x => `${outcomeText(x)} ${x.oddsRaw}`).join(" / ")}`
    ).join("\n");

    latestText =
`三场两结果 最小金额3串1计算结果
购买倍数：${multiple.toLocaleString("zh-CN")}
最小总金额：${bigIntToMoneyString(minStake)}
实际总金额：${bigIntToMoneyString(actualStake)}
总注数：${totalUnits.toLocaleString("zh-CN")} 注
${selectedText}

任一命中返还：${bigIntToMoneyString(singleReturn)}
净收益：${bigIntToMoneyString(profit)}
收益率：${fmtRateNumber(rate)}

购买清单：
${rowsText.join("\n")}`;

  } catch (err) {
    errorBox.textContent = err.message || String(err);
    errorBox.style.display = "block";
  }
}

document.getElementById("calcBtn").addEventListener("click", calculate);

document.getElementById("copyBtn").addEventListener("click", async () => {
  if (!latestText) calculate();
  try {
    await navigator.clipboard.writeText(latestText);
    alert("已复制购买清单");
  } catch (e) {
    alert("复制失败，可手动长按表格内容复制。");
  }
});

document.addEventListener("input", (e) => {
  if (e.target.tagName === "INPUT") {
    try {
      const oddsInputs = [];
      for (let i = 0; i < 3; i++) {
        for (const o of outcomeNames) oddsInputs.push(document.getElementById(`m${i}_${o.key}`));
      }
      if (oddsInputs.every(x => x.value !== "")) calculate();
      else {
        for (let i = 0; i < 3; i++) {
          const home = safeTeamName(document.getElementById(`m${i}_home`).value, "主队");
          const away = safeTeamName(document.getElementById(`m${i}_away`).value, "客队");
          document.getElementById(`matchname_${i}`).textContent = `第 ${i + 1} 场：${home} vs ${away}`;
        }
      }
    } catch (_) {}
  }
});
</script>
</body>
</html>
