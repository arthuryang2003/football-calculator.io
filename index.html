<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>足球串关计算器 - 版本入口</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --border: #dfe5ef;
      --accent: #176b5b;
      --accent-2: #234b8f;
      --accent-3: #b54708;
      --shadow: 0 14px 34px rgba(18, 32, 55, .08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
        Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef4f1 0%, var(--bg) 48%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 28px 16px 44px;
    }
    header {
      padding: 12px 2px 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 7vw, 40px);
      letter-spacing: 0;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }
    .versions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      display: flex;
      min-height: 280px;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      padding: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .tag {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e8f3ef;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }
    .tag.v2 {
      background: #eaf0fb;
      color: var(--accent-2);
    }
    .tag.v3 {
      background: #fff7ed;
      color: var(--accent-3);
    }
    h2 {
      margin: 14px 0 10px;
      font-size: 22px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
    }
    a.button.v2 { background: var(--accent-2); }
    a.button.v3 { background: var(--accent-3); }
    .foot {
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 980px) {
      .versions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .wrap { padding-top: 20px; }
      .versions { grid-template-columns: 1fr; }
      .card { min-height: 0; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>足球串关计算器</h1>
      <p class="sub">选择要使用的版本。此入口页不包含投注计算逻辑。</p>
    </header>

    <section class="versions" aria-label="版本选择">
      <article class="card">
        <div>
          <span class="tag">v1 稳定版</span>
          <h2>固定三场计算器</h2>
          <p>固定三场比赛，自动选择每场赔率最低的两个结果，在预算内搜索整数注数方案。</p>
        </div>
        <a class="button" href="./v1.html">进入 v1 稳定版</a>
      </article>

      <article class="card">
        <div>
          <span class="tag v2">v2 新版迭代</span>
          <h2>多场与信心权重</h2>
          <p>支持多场比赛、手动选择结果、单场只买一个结果、信心权重和多种收益率优化方式。</p>
        </div>
        <a class="button v2" href="./v2.html">进入 v2 新版</a>
      </article>

      <article class="card">
        <div>
          <span class="tag v3">v3 保险串关</span>
          <h2>保本结果 + 收益串关</h2>
          <p>支持不让球和让球两套赔率，把部分结果设为保本保险，收益结果自动串关，并输出均衡或倾斜的下注组合。</p>
        </div>
        <a class="button v3" href="./v3-hedge.html">进入 v3 保险串关</a>
      </article>
    </section>

    <p class="foot">小赌怡情，大赌伤身。</p>
  </main>
</body>
</html>
